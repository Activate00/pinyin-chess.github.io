<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拼音极速赛车飞行棋 - 赛季积分版</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Microsoft YaHei', sans-serif; }
        body { background-color: #1e2522; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; color: #fff; }
        .container { width: 100%; max-width: 850px; background: #2b3330; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); padding: 30px; border: 2px solid #3d4a45; }
        
        /* 赛车主题风格标题 */
        h1 { text-align: center; color: #f5bc3e; margin-bottom: 5px; font-style: italic; letter-spacing: 1px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .subtitle { text-align: center; color: #a2b3ad; font-size: 14px; margin-bottom: 25px; }

        .view { display: none; }
        .view.active { display: block; }
        
        /* 准备界面 & 通用按钮 */
        #setup-view, #victory-view, #leaderboard-view { text-align: center; padding: 30px 20px; }
        .player-selector { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .player-option { padding: 12px 30px; border: 3px solid #4a5953; border-radius: 12px; cursor: pointer; font-size: 16px; font-weight: bold; background: #222a27; color: #a2b3ad; transition: all 0.2s; }
        .player-option:hover { border-color: #f5bc3e; color: #fff; }
        .player-option.selected { border-color: #f5bc3e; background-color: #f5bc3e; color: #1e2522; transform: scale(1.05); box-shadow: 0 0 15px rgba(245,188,62,0.4); }
        
        .start-btn { background-color: #ff4a4a; color: white; border: none; padding: 15px 40px; font-size: 18px; font-weight: bold; font-style: italic; border-radius: 30px; cursor: pointer; box-shadow: 0 5px 15px rgba(255,74,74,0.4); transition: all 0.2s; display: inline-block; margin: 10px; }
        .start-btn:hover { background-color: #ff2b2b; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255,74,74,0.6); }
        .btn-secondary { background-color: #4a5953; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .btn-secondary:hover { background-color: #5c6e66; box-shadow: 0 8px 20px rgba(0,0,0,0.4); }

        /* 游戏界面头部 */
        .game-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: #1e2522; padding: 12px 15px; border-radius: 12px; border: 1px solid #3d4a45; }
        .turn-info { display: flex; align-items: center; font-size: 16px; font-weight: bold; }
        .back-btn { background: #4a5953; color: white; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-weight:bold; font-size: 12px; }
        .back-btn:hover { background: #ff4a4a; }

        /* 赛道棋盘容器 */
        .board-container { margin: 15px 0; background: #151a18; padding: 20px; border-radius: 15px; border: 3px solid #111; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); }
        .board-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
        
        /* 赛道格子 */
        .cell { aspect-ratio: 1; background: #2f3835; border: 2px solid #44524e; border-radius: 12px; display: flex; flex-direction: column; align-items: center; padding: 6px; position: relative; font-size: 13px; transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .cell-num { align-self: flex-start; font-size: 11px; color: #829690; font-weight: bold; font-family: monospace; }
        .track-arrow { position: absolute; top: 4px; right: 8px; font-size: 14px; font-weight: bold; color: rgba(245,188,62,0.35); animation: pulse 1.5s infinite alternate; }
        @keyframes pulse { 0% { opacity: 0.4; } 100% { opacity: 1; color: rgba(245,188,62,0.8); } }
        .cell-type-text { font-size: 11px; margin: auto; text-align: center; font-weight: bold; line-height: 1.2; }
        
        /* 特殊赛道格子 */
        .cell-start { background: repeating-conic-gradient(#fff 0% 25%, #111 0% 50%) 50% / 12px 12px; border-color: #fff; }
        .cell-start .cell-type-text { background: rgba(255,255,255,0.9); padding: 2px 4px; border-radius: 4px; border: 1px solid #111; color: #111; }
        .cell-start .cell-num { color: #111; background: #fff; padding: 0 2px; border-radius: 2px; }
        .cell-finish { background: repeating-conic-gradient(#fff 0% 25%, #ff4a4a 0% 50%) 50% / 12px 12px; border-color: #ff4a4a; }
        .cell-finish .cell-type-text { background: rgba(17,17,17,0.9); padding: 2px 4px; border-radius: 4px; border: 1px solid #ff4a4a; color: #fff; }
        .cell-finish .cell-num { color: #fff; background: #111; padding: 0 2px; border-radius: 2px; }
        .cell-bonus { background: #1b4d3e; border-color: #2e7d32; color: #a3e2a6; box-shadow: inset 0 0 10px rgba(46,125,50,0.5); }
        .cell-trap { background: #4d2626; border-color: #c62828; color: #ff9e9e; box-shadow: inset 0 0 10px rgba(198,40,40,0.5); }

        /* 赛车棋子 */
        .tokens-container { display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 4px; width: 100%; min-height: 24px; margin-top: auto; padding-top: 4px; }
        .car-token { width: 22px; height: 22px; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.5)); transition: all 0.3s ease; }
        .car-body { transition: fill 0.3s; }
        .p-car-1 .car-body { fill: #ff4a4a; }
        .p-car-2 .car-body { fill: #3b82f6; }
        .p-car-3 .car-body { fill: #eab308; }
        .p-car-4 .car-body { fill: #a855f7; }

        /* 底部控制台 */
        .controls-panel { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; gap: 15px; }
        .dice-area { display: flex; align-items: center; gap: 15px; background: #1e2522; padding: 10px 20px; border-radius: 15px; flex-grow: 1; border: 1px solid #3d4a45; }
        .dice-btn { background-color: #f5bc3e; color: #1e2522; border: none; padding: 10px 25px; font-size: 16px; font-weight: bold; font-style: italic; border-radius: 10px; cursor: pointer; transition: background 0.2s; }
        .dice-btn:hover { background-color: #dfaa31; }
        .dice-btn:disabled { background-color: #4a5953; color: #72857e; cursor: not-allowed; }
        .dice-display { width: 45px; height: 45px; background: #151a18; border: 3px solid #f5bc3e; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 22px; font-weight: bold; color: #f5bc3e; box-shadow: inset 0 0 8px rgba(0,0,0,0.6); }
        .log-panel { width: 260px; height: 65px; background: #151a18; border: 1px solid #3d4a45; border-radius: 12px; padding: 8px 12px; font-size: 12px; color: #cdded8; overflow-y: auto; }

        /* 模态框 */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.75); display: flex; justify-content: center; align-items: center; z-index: 100; display: none; backdrop-filter: blur(3px); }
        .modal-overlay.active { display: flex; }
        .modal-content { background: #2b3330; border: 2px solid #f5bc3e; border-radius: 20px; padding: 30px; text-align: center; width: 90%; max-width: 460px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .pinyin-display { font-size: 60px; font-weight: bold; color: #f5bc3e; margin: 20px 0; text-shadow: 0 4px 8px rgba(0,0,0,0.3); background: #151a18; padding: 15px; border-radius: 12px; border: 1px dashed #4a5953; }
        .choice-btn { padding: 12px 30px; font-size: 16px; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; margin: 5px; transition: transform 0.1s; }
        .choice-btn:active { transform: scale(0.95); }
        .btn-correct { background-color: #2e7d32; color: white; box-shadow: 0 4px 10px rgba(46,125,50,0.4); }
        .btn-wrong { background-color: #c62828; color: white; box-shadow: 0 4px 10px rgba(198,40,40,0.4); }

        /* 积分榜 & 结算专属样式 */
        .victory-title { font-size: 32px; color: #f5bc3e; font-style: italic; margin-bottom: 10px; text-shadow: 0 0 10px rgba(245,188,62,0.5); }
        .header-car-indicator { width: 18px; height: 18px; display: inline-block; vertical-align: middle; margin-right: 6px; }
        
        .name-input { background: #151a18; border: 2px solid #4a5953; color: #f5bc3e; padding: 12px 20px; font-size: 18px; border-radius: 10px; width: 80%; max-width: 300px; margin-bottom: 20px; text-align: center; font-weight: bold; outline: none; transition: 0.3s; }
        .name-input:focus { border-color: #f5bc3e; box-shadow: 0 0 10px rgba(245,188,62,0.3); }
        
        .leaderboard-list { background: #151a18; border: 2px solid #3d4a45; border-radius: 12px; padding: 20px; margin: 15px auto 25px auto; max-width: 500px; max-height: 300px; overflow-y: auto; text-align: left; }
        .lb-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #2b3330; font-size: 16px; align-items: center; }
        .lb-item:last-child { border-bottom: none; }
        .lb-rank-1 { color: #f5bc3e; font-size: 20px; font-weight: bold; background: rgba(245,188,62,0.1); border-radius: 8px; }
        .lb-rank-2 { color: #d3d3d3; font-weight: bold; font-size: 18px; }
        .lb-rank-3 { color: #cd7f32; font-weight: bold; font-size: 18px; }
        
        .reward-box { background: rgba(245,188,62,0.15); border: 1px dashed #f5bc3e; padding: 10px; border-radius: 8px; margin-bottom: 15px; color: #f5bc3e; font-size: 14px; }
    </style>
</head>
<body>
<div class="container">
    <h1>🏎️ 拼音极速赛车飞行棋 🏎️</h1>
    <div class="subtitle">让引擎轰鸣，争夺赛季车神榜榜首奖励！</div>
    
    <!-- 1. 准备设置界面 -->
    <div id="setup-view" class="view active">
        <div style="margin-bottom:25px; color:#a2b3ad; font-size: 16px;">选择参赛的车手人数：</div>
        <div class="player-selector">
            <div class="player-option selected" id="opt-2" onclick="selectPlayerCount(2)">2 车手</div>
            <div class="player-option" id="opt-3" onclick="selectPlayerCount(3)">3 车手</div>
            <div class="player-option" id="opt-4" onclick="selectPlayerCount(4)">4 车手</div>
        </div>
        <button class="start-btn" onclick="startGame()">🏁 发动引擎，开赛！</button>
        <br>
        <button class="start-btn btn-secondary" onclick="showLeaderboardView()">🏆 查看本赛季积分榜</button>
    </div>

    <!-- 2. 游戏大厅/主界面 -->
    <div id="game-view" class="view">
        <div class="game-header">
            <div class="turn-info">
                当前:
                <div class="header-car-indicator" id="turn-car-icon" style="margin-left:8px;"></div>
                <span id="turn-text" style="color:#f5bc3e;">车手 1</span>
            </div>
            <div style="color:#a2b3ad; font-size: 12px;">规则:刚好到达第30格</div>
            <button class="back-btn" onclick="quitToMenu()">🛑 返回车库</button>
        </div>
        
        <div class="board-container">
            <div class="board-grid" id="board-grid"></div>
        </div>
        
        <div class="controls-panel">
            <div class="dice-area">
                <button class="dice-btn" id="roll-btn" onclick="rollDice()">踩油门</button>
                <div class="dice-display" id="dice-result">-</div>
            </div>
            <div class="log-panel" id="log-panel">
                <div>🏁 比赛开始，请车手1踩下油门！</div>
            </div>
        </div>
    </div>

    <!-- 3. 颁奖与登记界面 -->
    <div id="victory-view" class="view">
        <h2 class="victory-title" id="winner-message">🏆 恭喜车手赢下比赛！</h2>
        <div style="font-size: 16px; color: #a2b3ad; margin-bottom: 25px;">
            本次夺冠将获得 <span style="color:#f5bc3e;font-weight:bold;font-size:20px;">10</span> 点赛季积分！
        </div>
        
        <input type="text" id="winner-name" class="name-input" placeholder="输入车手ID登记积分..." maxlength="12">
        <br>
        <button class="start-btn" onclick="submitScore()">📝 登记积分并查看榜单</button>
        <br>
        <button class="start-btn btn-secondary" onclick="quitToMenu()">🔙 放弃积分，返回车库</button>
    </div>

    <!-- 4. 赛季积分榜界面 -->
    <div id="leaderboard-view" class="view">
        <h2 class="victory-title" id="season-title">🏁 赛季车神榜 🏁</h2>
        <div class="reward-box">
            🎁 <b>赛季奖励机制：</b> 本月底积分结算时，榜首车手将获得【专属黄金限量赛车盲盒】一个！
        </div>
        
        <div class="leaderboard-list" id="leaderboard-list">
            <!-- 榜单数据由JS动态生成 -->
        </div>
        
        <button class="start-btn btn-secondary" onclick="quitToMenu()">🔙 返回车库</button>
    </div>

</div>

<!-- 拼音挑战弹窗 -->
<div class="modal-overlay" id="challenge-modal">
    <div class="modal-content">
        <div style="font-size:18px; color:#a2b3ad;">📢 车手请大声拼读该赛道音节：</div>
        <div class="pinyin-display" id="pinyin-word">bā</div>
        <button class="choice-btn btn-correct" onclick="handleResult(true)">拼读正确 🏎️</button>
        <button class="choice-btn btn-wrong" onclick="handleResult(false)">拼读错误 🛠️</button>
    </div>
</div>

<!-- 赛道特殊状况弹窗 -->
<div class="modal-overlay" id="info-modal">
    <div class="modal-content">
        <div id="info-modal-text" style="font-size: 20px; font-weight:bold; margin-bottom: 25px; line-height:1.5; color:#fff;"></div>
        <button class="start-btn" style="padding: 10px 40px; font-size: 16px;" onclick="closeInfo()">继续前进</button>
    </div>
</div>

<script>
    window.onerror = function(msg) { alert("赛道出现突发状况，请刷新重试: " + msg); };

    var pinyinBank = [
        'zhī', 'zhí', 'zhǐ', 'zhì', 'chī', 'chí', 'chǐ', 'chì', 'shī', 'shí', 'shǐ', 'shì', 'rī', 'rí', 'rǐ', 'rì',
        'yū', 'yú', 'yǔ', 'yù', 'yē', 'yé', 'yě', 'yè', 'yuē', 'yué', 'yuě', 'yuè', 'yuān', 'yuán', 'yuǎn', 'yuàn',
        'jiā', 'jiá', 'jiǎ', 'jià', 'jiāo', 'jiáo', 'jiǎo', 'jiào', 'jiān', 'jiǎn', 'jiàn', 'jiāng', 'jiǎng', 'jiàng', 'jiǒng', 'jiòng',
        'guā', 'guá', 'guǎ', 'guà', 'guāi', 'guǎi', 'guài', 'guān', 'guǎn', 'guàn', 'guāng', 'guǎng', 'guàng',
        'zhuā', 'zhuǎ', 'zhuà', 'zhuāi', 'zhuǎi', 'zhuài', 'zhuān', 'zhuǎn', 'zhuàn', 'zhuāng', 'zhuǎng', 'zhuàng',
        'bā', 'bō', 'bǐ', 'bù', 'pā', 'pó', 'pī', 'pū', 'mā', 'mó', 'mǐ', 'mù', 'fā', 'fó', 'fǔ', 'fù',
        'bān', 'bāng', 'pén', 'péng', 'mín', 'míng', 'fēn', 'fēng',
        'zhěn', 'zhèng', 'chén', 'chéng', 'shēn', 'shēng', 'rěn', 'réng', 'xuān', 'xuán', 'quān', 'quán', 'juān', 'juán'
    ];

    var bonusCells = [5, 14, 22, 27];
    var trapCells = [9, 17, 20, 25];
    
    var totalPlayers = 2;
    var currentPlayer = 1;
    var playerPositions = {1:1, 2:1, 3:1, 4:1};
    var originalPosition = 1;
    
    var gridOrder = [
        1,  2,  3,  4,  5,  6,
        12, 11, 10, 9,  8,  7,
        13, 14, 15, 16, 17, 18,
        24, 23, 22, 21, 20, 19,
        25, 26, 27, 28, 29, 30
    ];

    // 获取当前年月作为赛季标识
    function getCurrentSeason() {
        var d = new Date();
        return d.getFullYear() + "年" + (d.getMonth() + 1) + "月";
    }

    // 页面切换助手
    function switchView(viewId) {
        document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('active'); });
        document.getElementById(viewId).classList.add('active');
    }

    function generateCarSVG(playerNum) {
        return '<svg class="car-token p-car-' + playerNum + '" viewBox="0 0 24 24">' +
               '<rect x="7" y="2" width="10" height="20" rx="2" class="car-body" fill="#aaa"/>' +
               '<rect x="4" y="4" width="3" height="4" rx="1" fill="#111"/>' +
               '<rect x="17" y="4" width="3" height="4" rx="1" fill="#111"/>' +
               '<rect x="4" y="15" width="3" height="5" rx="1" fill="#111"/>' +
               '<rect x="17" y="15" width="3" height="5" rx="1" fill="#111"/>' +
               '<polygon points="9,10 15,10 14,7 10,7" fill="#fff" opacity="0.6"/>' +
               '<rect x="5" y="20" width="14" height="2" fill="#ff1111"/>' +
               '</svg>';
    }

    function getDirectionArrow(num) {
        if (num === 30) return '';
        if (num === 6 || num === 12 || num === 18 || num === 24) return '↓';
        if ((num >= 1 && num <= 5) || (num >= 13 && num <= 17) || (num >= 25 && num <= 29)) return '→';
        if ((num >= 7 && num <= 11) || (num >= 19 && num <= 23)) return '←';
        return '';
    }

    function selectPlayerCount(count) {
        totalPlayers = count;
        document.getElementById('opt-2').className = count === 2 ? 'player-option selected' : 'player-option';
        document.getElementById('opt-3').className = count === 3 ? 'player-option selected' : 'player-option';
        document.getElementById('opt-4').className = count === 4 ? 'player-option selected' : 'player-option';
    }

    // 返回车库 (直接刷新重置游戏状态最干净)
    function quitToMenu() {
        location.reload();
    }

    function startGame() {
        switchView('game-view');
        playerPositions = {1:1, 2:1, 3:1, 4:1};
        currentPlayer = 1;
        renderBoard();
        updateUI();
    }

    function renderBoard() {
        var html = '';
        for(var i=0; i<gridOrder.length; i++) {
            var num = gridOrder[i];
            var typeText = '';
            var cellClass = 'cell';
            var arrow = getDirectionArrow(num);
            
            if(num === 1) { typeText = '起跑线'; cellClass += ' cell-start'; }
            else if(num === 30) { typeText = '方格旗'; cellClass += ' cell-finish'; }
            else if(bonusCells.indexOf(num) > -1) { typeText = '氮气加速<br>+2步'; cellClass += ' cell-bonus'; }
            else if(trapCells.indexOf(num) > -1) { typeText = '沙地打滑<br>-2步'; cellClass += ' cell-trap'; }
            
            html += '<div class="' + cellClass + '">' +
                    '<span class="cell-num">' + num + '</span>' +
                    (arrow ? '<span class="track-arrow">' + arrow + '</span>' : '') +
                    '<span class="cell-type-text">' + typeText + '</span>' +
                    '<div class="tokens-container" id="tokens-' + num + '"></div>' +
                    '</div>';
        }
        document.getElementById('board-grid').innerHTML = html;
        updateTokens();
    }

    function updateTokens() {
        for(var i=1; i<=30; i++) {
            var container = document.getElementById('tokens-' + i);
            if(container) container.innerHTML = '';
        }
        for(var p=1; p<=totalPlayers; p++) {
            var pos = playerPositions[p];
            var container = document.getElementById('tokens-' + pos);
            if(container) {
                container.innerHTML += generateCarSVG(p);
            }
        }
    }

    function updateUI() {
        document.getElementById('turn-text').innerText = '车手 ' + currentPlayer;
        document.getElementById('turn-car-icon').innerHTML = generateCarSVG(currentPlayer);
        document.getElementById('dice-result').innerText = '-';
        document.getElementById('roll-btn').disabled = false;
    }

    function log(msg) {
        var p = document.getElementById('log-panel');
        p.innerHTML += '<div style="margin-bottom:4px;">' + msg + '</div>';
        p.scrollTop = p.scrollHeight;
    }

    function rollDice() {
        document.getElementById('roll-btn').disabled = true;
        var r = Math.floor(Math.random() * 6) + 1;
        document.getElementById('dice-result').innerText = r;
        originalPosition = playerPositions[currentPlayer];
        
        var target = originalPosition + r;
        var isBounced = false;
        
        if(target > 30) {
            target = 30 - (target - 30);
            isBounced = true;
        }
        
        playerPositions[currentPlayer] = target;
        updateTokens();
        
        if (isBounced) {
            log('🏎️ 掷出 ' + r + '点，油门过猛反弹回第 ' + target + ' 格。');
        } else {
            log('🏎️ 掷出 ' + r + '点，向前飙至第 ' + target + ' 格。');
        }
        
        setTimeout(function(){
            var py = pinyinBank[Math.floor(Math.random() * pinyinBank.length)];
            document.getElementById('pinyin-word').innerText = py;
            document.getElementById('challenge-modal').className = 'modal-overlay active';
        }, 500);
    }

    function handleResult(isCorrect) {
        document.getElementById('challenge-modal').className = 'modal-overlay';
        if(!isCorrect) {
            playerPositions[currentPlayer] = originalPosition;
            updateTokens();
            log('🛠️ 拼读失误！退回第 ' + originalPosition + ' 格。');
            nextPlayer();
        } else {
            var pos = playerPositions[currentPlayer];
            if(pos === 30) {
                win();
            } else if(bonusCells.indexOf(pos) > -1) {
                playerPositions[currentPlayer] = Math.min(30, pos + 2);
                updateTokens();
                showInfo('🔥 触发【氮气加速】！<br><br>额外向前推进2步，冲向第 ' + playerPositions[currentPlayer] + ' 格！');
            } else if(trapCells.indexOf(pos) > -1) {
                playerPositions[currentPlayer] = Math.max(1, pos - 2);
                updateTokens();
                showInfo('⚠️ 误入【沙地打滑区】！<br><br>被迫向后退2步，降落至第 ' + playerPositions[currentPlayer] + ' 格。');
            } else {
                log('✅ 拼读成功！占领第 ' + pos + ' 赛道格。');
                nextPlayer();
            }
        }
    }

    function showInfo(txt) {
        document.getElementById('info-modal-text').innerHTML = txt;
        document.getElementById('info-modal').className = 'modal-overlay active';
    }

    function closeInfo() {
        document.getElementById('info-modal').className = 'modal-overlay';
        if(playerPositions[currentPlayer] === 30) win();
        else nextPlayer();
    }

    function nextPlayer() {
        currentPlayer++;
        if(currentPlayer > totalPlayers) currentPlayer = 1;
        updateUI();
    }

    // 获胜结算
    function win() {
        switchView('victory-view');
        document.getElementById('winner-message').innerText = '🏆 恭喜 车手 ' + currentPlayer + ' 夺得冠军！';
        document.getElementById('winner-name').value = ''; // 清空输入框
    }

    // 提交积分并查看榜单
    function submitScore() {
        var nameInput = document.getElementById('winner-name').value.trim();
        if(!nameInput) {
            alert("请先输入你的车手ID！");
            return;
        }

        var season = getCurrentSeason();
        // 取出本地存储的积分数据
        var lbData = JSON.parse(localStorage.getItem('pinyinRacingLeaderboard')) || {};
        
        if(!lbData[season]) { lbData[season] = {}; }
        
        // 积分累加 (每次夺冠+10分)
        if(lbData[season][nameInput]) {
            lbData[season][nameInput] += 10;
        } else {
            lbData[season][nameInput] = 10;
        }
        
        // 保存回本地
        localStorage.setItem('pinyinRacingLeaderboard', JSON.stringify(lbData));
        
        // 自动跳转展示榜单
        showLeaderboardView();
    }

    // 展示赛季积分榜
    function showLeaderboardView() {
        switchView('leaderboard-view');
        var season = getCurrentSeason();
        document.getElementById('season-title').innerText = "🏁 " + season + " 赛季车神榜 🏁";
        
        var lbData = JSON.parse(localStorage.getItem('pinyinRacingLeaderboard')) || {};
        var currentSeasonData = lbData[season] || {};
        
        // 将对象转为数组以排序
        var sortable = [];
        for (var player in currentSeasonData) {
            sortable.push({ name: player, score: currentSeasonData[player] });
        }
        // 按分数从高到低排序
        sortable.sort(function(a, b) { return b.score - a.score; });
        
        var html = '';
        if(sortable.length === 0) {
            html = '<div style="text-align:center; color:#a2b3ad; padding:20px;">本赛季暂无车手登记成绩，<br>快去赛场拿下首胜吧！</div>';
        } else {
            for(var i=0; i<sortable.length; i++) {
                var rankClass = '';
                var icon = '';
                if(i === 0) { rankClass = 'lb-rank-1'; icon = '👑 '; }
                else if(i === 1) { rankClass = 'lb-rank-2'; icon = '🥈 '; }
                else if(i === 2) { rankClass = 'lb-rank-3'; icon = '🥉 '; }
                
                html += '<div class="lb-item ' + rankClass + '">' +
                        '<span>' + icon + '第 ' + (i+1) + ' 名：' + sortable[i].name + '</span>' +
                        '<span>' + sortable[i].score + ' 分</span>' +
                        '</div>';
            }
        }
        
        document.getElementById('leaderboard-list').innerHTML = html;
    }
</script>
</body>
</html>
