<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拼音大冒险飞行棋 - 纯净反弹版</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Microsoft YaHei', sans-serif; }
        body { background-color: #f0f7f4; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { width: 100%; max-width: 800px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); padding: 30px; }
        h1 { text-align: center; color: #2c5d63; margin-bottom: 20px; }
        .view { display: none; }
        .view.active { display: block; }
        #setup-view, #victory-view { text-align: center; padding: 40px 20px; }
        .player-selector { display: flex; justify-content: center; gap: 20px; margin-bottom: 40px; }
        .player-option { padding: 15px 30px; border: 3px solid #e0e0e0; border-radius: 12px; cursor: pointer; font-size: 18px; font-weight: bold; background: #fff; }
        .player-option.selected { border-color: #2c5d63; background-color: #2c5d63; color: white; }
        .start-btn { background-color: #ff6f59; color: white; border: none; padding: 15px 50px; font-size: 20px; font-weight: bold; border-radius: 30px; cursor: pointer; }
        .game-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: #f7fbf9; padding: 15px; border-radius: 12px; }
        .board-container { margin: 20px 0; background: #fafafa; padding: 15px; border-radius: 15px; border: 2px dashed #ccdcd5; }
        .board-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
        .cell { aspect-ratio: 1; background: white; border: 2px solid #e0e0e0; border-radius: 10px; display: flex; flex-direction: column; align-items: center; padding: 6px; position: relative; font-size: 14px; }
        .cell-num { align-self: flex-start; font-size: 11px; color: #999; }
        .cell-type-text { font-size: 12px; margin: auto; text-align: center; }
        .cell-start { background-color: #ebf5ff; }
        .cell-finish { background-color: #fff9c4; }
        .cell-bonus { background-color: #e8f5e9; color: #2e7d32; font-weight:bold; }
        .cell-trap { background-color: #ffebee; color: #c62828; font-weight:bold;}
        .tokens-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; width: 100%; min-height: 16px; margin-top: auto; }
        .token { width: 14px; height: 14px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.2); }
        .p-color-1 { background-color: #ff4a4a; }
        .p-color-2 { background-color: #3b82f6; }
        .p-color-3 { background-color: #eab308; }
        .p-color-4 { background-color: #a855f7; }
        .controls-panel { display: flex; justify-content: space-between; align-items: center; margin-top: 25px; gap: 20px; }
        .dice-area { display: flex; align-items: center; gap: 20px; background: #f7fbf9; padding: 10px 20px; border-radius: 15px; flex-grow: 1; }
        .dice-btn { background-color: #2c5d63; color: white; border: none; padding: 12px 25px; font-size: 16px; border-radius: 10px; cursor: pointer; }
        .dice-btn:disabled { background-color: #ccc; cursor: not-allowed; }
        .dice-display { width: 50px; height: 50px; border: 3px solid #2c5d63; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 24px; font-weight: bold; }
        .log-panel { width: 250px; height: 74px; background: #fafafa; border: 1px solid #eee; border-radius: 10px; padding: 8px 12px; font-size: 12px; overflow-y: auto; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 100; display: none; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: white; border-radius: 20px; padding: 30px; text-align: center; width: 90%; max-width: 450px; }
        .pinyin-display { font-size: 64px; font-weight: bold; color: #2c5d63; margin: 20px 0; }
        .choice-btn { padding: 12px 30px; font-size: 16px; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; margin: 5px; }
        .btn-correct { background-color: #4caf50; color: white; }
        .btn-wrong { background-color: #f44336; color: white; }
    </style>
</head>
<body>
<div class="container">
    <h1>拼音大冒险 - 进阶版</h1>
    
    <div id="setup-view" class="view active">
        <div style="margin-bottom:20px; color:#666;">新增规则：必须正好走到第30格才能获胜哦！</div>
        <div class="player-selector">
            <div class="player-option selected" id="opt-2" onclick="selectPlayerCount(2)">2 人</div>
            <div class="player-option" id="opt-3" onclick="selectPlayerCount(3)">3 人</div>
            <div class="player-option" id="opt-4" onclick="selectPlayerCount(4)">4 人</div>
        </div>
        <button class="start-btn" onclick="startGame()">开始挑战</button>
    </div>

    <div id="game-view" class="view">
        <div class="game-header">
            <div>当前轮到：<span class="token p-color-1" style="display:inline-block; vertical-align: middle; margin:0 5px;" id="turn-color"></span> <span id="turn-text" style="font-weight:bold;">玩家 1</span></div>
            <div style="color:#888;">终点：30格</div>
        </div>
        <div class="board-container">
            <div class="board-grid" id="board-grid"></div>
        </div>
        <div class="controls-panel">
            <div class="dice-area">
                <button class="dice-btn" id="roll-btn" onclick="rollDice()">掷骰子</button>
                <div class="dice-display" id="dice-result">-</div>
            </div>
            <div class="log-panel" id="log-panel">
                <div>游戏开始，请玩家1掷骰子。</div>
            </div>
        </div>
    </div>

    <div id="victory-view" class="view">
        <h2 id="winner-message" style="font-size:32px; margin-bottom:20px;">恭喜获胜！</h2>
        <button class="start-btn" onclick="location.reload()">再玩一次</button>
    </div>
</div>

<div class="modal-overlay" id="challenge-modal">
    <div class="modal-content">
        <div style="font-size:18px; color:#666;">大声拼读，挑战自己：</div>
        <div class="pinyin-display" id="pinyin-word">ba</div>
        <button class="choice-btn btn-correct" onclick="handleResult(true)">读对啦</button>
        <button class="choice-btn btn-wrong" onclick="handleResult(false)">读错啦</button>
    </div>
</div>

<div class="modal-overlay" id="info-modal">
    <div class="modal-content">
        <div id="info-modal-text" style="font-size: 20px; font-weight:bold; margin-bottom: 25px; line-height:1.5;"></div>
        <button class="start-btn" onclick="closeInfo()">我知道了</button>
    </div>
</div>

<script>
    window.onerror = function(msg) { alert("遇到小故障了，请刷新页面: " + msg); };

    var pinyinBank = [
        'zhī', 'zhí', 'zhǐ', 'zhì', 'chī', 'chí', 'chǐ', 'chì', 'shī', 'shí', 'shǐ', 'shì', 'rī', 'rí', 'rǐ', 'rì',
        'zī', 'zí', 'zǐ', 'zì', 'cī', 'cí', 'cǐ', 'cì', 'sī', 'sí', 'sǐ', 'sì', 'yī', 'yí', 'yǐ', 'yì', 'wū', 'wú', 'wǔ', 'wù',
        'yū', 'yú', 'yǔ', 'yù', 'yē', 'yé', 'yě', 'yè', 'yuē', 'yué', 'yuě', 'yuè', 'yuān', 'yuán', 'yuǎn', 'yuàn',
        'yīn', 'yín', 'yǐn', 'yìn', 'yūn', 'yún', 'yǔn', 'yùn', 'yīng', 'yíng', 'yǐng', 'yìng',
        'jiā', 'jiá', 'jiǎ', 'jià', 'jiāo', 'jiáo', 'jiǎo', 'jiào', 'jiān', 'jiǎn', 'jiàn', 'jiāng', 'jiǎng', 'jiàng', 'jiǒng', 'jiòng',
        'qiā', 'qiá', 'qiǎ', 'qià', 'qiāo', 'qiáo', 'qiǎo', 'qiào', 'qiān', 'qián', 'qiǎn', 'qiàn', 'qiāng', 'qiáng', 'qiǎng', 'qiàng', 'qiǒng',
        'xiā', 'xiá', 'xiǎ', 'xià', 'xiāo', 'xiáo', 'xiǎo', 'xiào', 'xiān', 'xián', 'xiǎn', 'xiàn', 'xiāng', 'xiáng', 'xiǎng', 'xiàng', 'xiǒng',
        'guā', 'guá', 'guǎ', 'guà', 'guāi', 'guǎi', 'guài', 'guān', 'guǎn', 'guàn', 'guāng', 'guǎng', 'guàng',
        'kuā', 'kuǎ', 'kuà', 'kuāi', 'kuǎi', 'kuài', 'kuān', 'kuǎn', 'kuàn', 'kuāng', 'kuǎng', 'kuàng',
        'huā', 'huá', 'huǎ', 'huà', 'huái', 'huài', 'huān', 'huǎn', 'huàn', 'huāng', 'huáng', 'huǎng', 'huàng',
        'zhuā', 'zhuǎ', 'zhuà', 'zhuāi', 'zhuǎi', 'zhuài', 'zhuān', 'zhuǎn', 'zhuàn', 'zhuāng', 'zhuǎng', 'zhuàng',
        'chuā', 'chuái', 'chuài', 'chuān', 'chuǎn', 'chuàn', 'chuāng', 'chuáng', 'chuǎng', 'chuàng',
        'shuā', 'shuǎ', 'shuà', 'shuāi', 'shuǎi', 'shuài', 'shuān', 'shuǎn', 'shuàn', 'shuāng', 'shuǎng', 'shuàng',
        'ruān', 'ruǎn', 'ruàn', 'nuǎn', 'luǎn',
        'biāo', 'biǎo', 'biào', 'miāo', 'miǎo', 'miào', 'piāo', 'piáo', 'piǎo', 'piào', 
        'diāo', 'diǎo', 'diào', 'tiāo', 'tiáo', 'tiǎo', 'tiào', 'niāo', 'niǎo', 'niào', 'liāo', 'liáo', 'liǎo', 'liào',
        'bā', 'bō', 'bǐ', 'bù', 'pā', 'pó', 'pī', 'pū', 'mā', 'mó', 'mǐ', 'mù', 'fā', 'fó', 'fǔ', 'fù',
        'dā', 'dé', 'dī', 'dú', 'tā', 'tè', 'tī', 'tú', 'nā', 'nè', 'nǐ', 'nù', 'nǚ', 'lā', 'lè', 'lǐ', 'lù', 'lǘ',
        'gā', 'gē', 'gǔ', 'kā', 'kě', 'kǔ', 'hā', 'hé', 'hǔ',
        'bān', 'bāng', 'pén', 'péng', 'mín', 'míng', 'fēn', 'fēng',
        'dǎn', 'dǎng', 'těn', 'téng', 'nīn', 'níng', 'lún', 'lóng',
        'zǎn', 'zāng', 'cēn', 'céng', 'sǔn', 'sǒng',
        'zhěn', 'zhèng', 'chén', 'chéng', 'shēn', 'shēng', 'rěn', 'réng',
        'tiān', 'tián', 'tiǎn', 'tiàn', 'nián', 'liǎn', 'xuān', 'xuán', 'xuǎn', 'xuàn',
        'quān', 'quán', 'quǎn', 'quàn', 'juān', 'juán', 'juǎn', 'juàn'
    ];

    var bonusCells = [5, 14, 22, 27];
    var trapCells = [9, 17, 20, 25];
    var totalPlayers = 2;
    var currentPlayer = 1;
    var playerPositions = {1:1, 2:1, 3:1, 4:1};
    var originalPosition = 1;
    var gridOrder = [1,2,3,4,5,6,12,11,10,9,8,7,13,14,15,16,17,18,24,23,22,21,20,19,25,26,27,28,29,30];

    function selectPlayerCount(count) {
        totalPlayers = count;
        document.getElementById('opt-2').className = count === 2 ? 'player-option selected' : 'player-option';
        document.getElementById('opt-3').className = count === 3 ? 'player-option selected' : 'player-option';
        document.getElementById('opt-4').className = count === 4 ? 'player-option selected' : 'player-option';
    }

    function startGame() {
        document.getElementById('setup-view').className = 'view';
        document.getElementById('game-view').className = 'view active';
        playerPositions = {1:1, 2:1, 3:1, 4:1};
        currentPlayer = 1;
        renderBoard();
        updateUI();
    }

    function renderBoard() {
        var html = '';
        for(var i=0; i<gridOrder.length; i++) {
            var num = gridOrder[i];
            var typeText = '';
            var cellClass = 'cell';
            if(num === 1) { typeText = '起点'; cellClass += ' cell-start'; }
            else if(num === 30) { typeText = '终点'; cellClass += ' cell-finish'; }
            else if(bonusCells.indexOf(num) > -1) { typeText = '奖励+2'; cellClass += ' cell-bonus'; }
            else if(trapCells.indexOf(num) > -1) { typeText = '陷阱-2'; cellClass += ' cell-trap'; }
            
            html += '<div class="' + cellClass + '"><span class="cell-num">' + num + '</span><span class="cell-type-text">' + typeText + '</span><div class="tokens-container" id="tokens-' + num + '"></div></div>';
        }
        document.getElementById('board-grid').innerHTML = html;
        updateTokens();
    }

    function updateTokens() {
        for(var i=1; i<=30; i++) {
            var container = document.getElementById('tokens-' + i);
            if(container) container.innerHTML = '';
        }
        for(var p=1; p<=totalPlayers; p++) {
            var pos = playerPositions[p];
            var container = document.getElementById('tokens-' + pos);
            if(container) {
                container.innerHTML += '<div class="token p-color-' + p + '"></div>';
            }
        }
    }

    function updateUI() {
        document.getElementById('turn-text').innerText = '玩家 ' + currentPlayer;
        document.getElementById('turn-color').className = 'token p-color-' + currentPlayer;
        document.getElementById('dice-result').innerText = '-';
        document.getElementById('roll-btn').disabled = false;
    }

    function log(msg) {
        var p = document.getElementById('log-panel');
        p.innerHTML += '<div style="margin-bottom:4px;">' + msg + '</div>';
        p.scrollTop = p.scrollHeight;
    }

    function rollDice() {
        document.getElementById('roll-btn').disabled = true;
        var r = Math.floor(Math.random() * 6) + 1;
        document.getElementById('dice-result').innerText = r;
        originalPosition = playerPositions[currentPlayer];
        
        var target = originalPosition + r;
        var isBounced = false;
        
        // 核心修改点：超出的步数反弹机制
        if(target > 30) {
            target = 30 - (target - 30); // 超出的步数往回退
            isBounced = true;
        }
        
        playerPositions[currentPlayer] = target;
        updateTokens();
        
        if (isBounced) {
            log('玩家' + currentPlayer + ' 掷出 ' + r + '点，步数超出，退回第' + target + '格。');
        } else {
            log('玩家' + currentPlayer + ' 掷出 ' + r + '点，来到第' + target + '格。');
        }
        
        setTimeout(function(){
            var py = pinyinBank[Math.floor(Math.random() * pinyinBank.length)];
            document.getElementById('pinyin-word').innerText = py;
            document.getElementById('challenge-modal').className = 'modal-overlay active';
        }, 500);
    }

    function handleResult(isCorrect) {
        document.getElementById('challenge-modal').className = 'modal-overlay';
        if(!isCorrect) {
            playerPositions[currentPlayer] = originalPosition;
            updateTokens();
            log('读错了，退回第' + originalPosition + '格。');
            nextPlayer();
        } else {
            var pos = playerPositions[currentPlayer];
            if(pos === 30) {
                win();
            } else if(bonusCells.indexOf(pos) > -1) {
                playerPositions[currentPlayer] = Math.min(30, pos + 2);
                updateTokens();
                showInfo('读对了！触发【奖励格】\\n\\n额外前进2步，到达第' + playerPositions[currentPlayer] + '格');
            } else if(trapCells.indexOf(pos) > -1) {
                playerPositions[currentPlayer] = Math.max(1, pos - 2);
                updateTokens();
                showInfo('哎呀！踩到了【陷阱格】\\n\\n被迫后退2步，退回第' + playerPositions[currentPlayer] + '格');
            } else {
                log('读对啦！稳稳占领第' + pos + '格。');
                nextPlayer();
            }
        }
    }

    function showInfo(txt) {
        document.getElementById('info-modal-text').innerText = txt;
        document.getElementById('info-modal').className = 'modal-overlay active';
    }

    function closeInfo() {
        document.getElementById('info-modal').className = 'modal-overlay';
        if(playerPositions[currentPlayer] === 30) win();
        else nextPlayer();
    }

    function nextPlayer() {
        currentPlayer++;
        if(currentPlayer > totalPlayers) currentPlayer = 1;
        updateUI();
    }

    function win() {
        document.getElementById('game-view').className = 'view';
        document.getElementById('victory-view').className = 'view active';
        document.getElementById('winner-message').innerText = '恭喜 玩家 ' + currentPlayer + ' 获得胜利！';
    }
</script>
</body>
</html>
